# Isle Be There - Full Stack Deployment
# Backend: FastAPI with ML classification
# Frontend: Served by FastAPI from frontend/dist

services:
- type: web
  name: isle-be-there
  env: python
  repo: https://github.com/ALDR-Solutions/isle-be-there.git
  plan: free
  branch: develop
  rootDir: backend
  healthCheckPath: /healthcheck
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  envVars:
  - key: ENV
    value: production
  - key: DATABASE_URL
    sync: false
  - key: JWT_SECRET_KEY
    sync: false
  - key: HF_TOKEN
    sync: false
  - key: MODEL_PATH
    value: models/
  - key: EMBEDDING_MODEL
    value: paraphrase-MiniLM-L3-v2
