{% extends "onboarding/base.html" %}
{% block onboarding_title %}Onboarding{% endblock %}

{% block content %}
  <section class="mx-auto max-w-2xl text-center">
    <div class="rounded-2xl bg-white p-10 shadow-sm ring-1 ring-slate-200">
      <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-brand-50">
        <svg class="h-10 w-10 text-brand-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900">Plan Your Perfect Trip</h1>
      <p class="mt-3 text-slate-500">Answer a few quick questions and we'll find the best packages for you.</p>

      <div class="mt-8 grid grid-cols-6 gap-2">
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-brand-600 text-sm font-bold text-white">1</div>
          <span class="text-xs text-slate-500">Welcome</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">2</div>
          <span class="text-xs text-slate-500">Interests</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">3</div>
          <span class="text-xs text-slate-500">Style</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">4</div>
          <span class="text-xs text-slate-500">Vibe</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">5</div>
          <span class="text-xs text-slate-500">Details</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">6</div>
          <span class="text-xs text-slate-500">Results</span>
        </div>
      </div>

      <a href="{{ url_for('onboarding_views.onboarding_step_1') }}" class="mt-8 inline-flex w-full items-center justify-center rounded-lg bg-brand-600 px-6 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-brand-700">
        Get Started
      </a>
    </div>
  </section>
{% endblock %}
