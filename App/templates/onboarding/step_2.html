{% extends "onboarding/base.html" %}
{% block onboarding_title %}What are you interested in?{% endblock %}

{% block content %}
  <section class="mx-auto max-w-lg">
    <!-- Progress bar -->
    <div class="mb-6">
      <div class="mb-2 flex justify-between text-xs font-medium text-slate-500">
        <span>Step 2 of 6</span>
        <span>33%</span>
      </div>
      <div class="h-2 w-full rounded-full bg-slate-200">
        <div class="h-2 rounded-full bg-brand-600" style="width: 33%"></div>
      </div>
    </div>

    <div class="rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">What are you interested in?</h1>
      <p class="mt-1 text-sm text-slate-500">Select all that apply.</p>

      <form action="{{ url_for('onboarding_views.onboarding_step_3') }}" method="GET" class="mt-6">
        <div class="space-y-3">
          <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-slate-200 px-4 py-3 transition hover:border-brand-300 hover:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50">
            <input type="checkbox" name="interests" value="hotels" class="h-5 w-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" {{ 'checked' if 'hotels' in params.getlist('interests') else '' }}>
            <div>
              <span class="text-base font-medium text-slate-900">Hotels</span>
              <p class="text-sm text-slate-500">Find the perfect place to stay</p>
            </div>
          </label>
          <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-slate-200 px-4 py-3 transition hover:border-brand-300 hover:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50">
            <input type="checkbox" name="interests" value="tours" class="h-5 w-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" {{ 'checked' if 'tours' in params.getlist('interests') else '' }}>
            <div>
              <span class="text-base font-medium text-slate-900">Tours</span>
              <p class="text-sm text-slate-500">Guided experiences and excursions</p>
            </div>
          </label>
          <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-slate-200 px-4 py-3 transition hover:border-brand-300 hover:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50">
            <input type="checkbox" name="interests" value="restaurants" class="h-5 w-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" {{ 'checked' if 'restaurants' in params.getlist('interests') else '' }}>
            <div>
              <span class="text-base font-medium text-slate-900">Restaurants</span>
              <p class="text-sm text-slate-500">Local dining and cuisine</p>
            </div>
          </label>
          <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-slate-200 px-4 py-3 transition hover:border-brand-300 hover:bg-brand-50 has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50">
            <input type="checkbox" name="interests" value="activities" class="h-5 w-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" {{ 'checked' if 'activities' in params.getlist('interests') else '' }}>
            <div>
              <span class="text-base font-medium text-slate-900">Activities</span>
              <p class="text-sm text-slate-500">Fun things to do on the island</p>
            </div>
          </label>
        </div>

        <div class="mt-8 flex items-center justify-between gap-3">
          <a href="{{ url_for('onboarding_views.onboarding_step_1') }}" class="rounded-lg border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Back</a>
          <button type="submit" class="rounded-lg bg-brand-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700">Continue</button>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
