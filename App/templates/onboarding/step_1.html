{% extends "onboarding/base.html" %}
{% block onboarding_title %}Welcome{% endblock %}

{% block content %}
  <section class="mx-auto max-w-lg">
    <!-- Progress bar -->
    <div class="mb-6">
      <div class="mb-2 flex justify-between text-xs font-medium text-slate-500">
        <span>Step 1 of 6</span>
        <span>17%</span>
      </div>
      <div class="h-2 w-full rounded-full bg-slate-200">
        <div class="h-2 rounded-full bg-brand-600" style="width: 17%"></div>
      </div>
    </div>

    <div class="rounded-2xl bg-white p-10 shadow-sm ring-1 ring-slate-200">
      <div class="mx-auto mb-8 flex h-16 w-16 items-center justify-center rounded-full bg-brand-50">
        <svg class="h-8 w-8 text-brand-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.841m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.448 14.9 14.9 0 0 1 .06-.312m-2.24 2.39a4.493 4.493 0 0 0-1.757 4.306 4.493 4.493 0 0 0 4.306-1.758M16.5 9a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>
      </div>

      <h1 class="text-center text-3xl font-bold tracking-tight text-slate-900">Welcome!</h1>
      <h2 class="mt-2 text-center text-3xl font-bold tracking-tight text-slate-900">Let's Plan Your Trip</h2>

      <p class="mt-4 text-center text-slate-500">We'll ask you a few quick questions to find the perfect experience.</p>

      <div class="mt-10 flex flex-col gap-3">
        <a href="{{ url_for('onboarding_views.onboarding_step_2') }}" class="inline-flex w-full items-center justify-center rounded-lg bg-brand-600 px-6 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-brand-700">
          Start
        </a>
      </div>
    </div>
  </section>
{% endblock %}
